version: '3.8'

services:
  # FastAPI Application with SQLite (simpler for development)
  app:
    build: .
    container_name: defect-detection-app-dev
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./metadata.db:/app/metadata.db  # Mount SQLite database
    environment:
      - DB_TYPE=sqlite
      - DB_PATH=/app/metadata.db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - minio
    networks:
      - defect-network
    restart: unless-stopped

  # MinIO Storage
  minio:
    image: minio/minio:latest
    container_name: defect-detection-minio-dev
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - defect-network
    restart: unless-stopped

  # MinIO Client to create bucket
  minio-init:
    image: minio/mc:latest
    container_name: defect-detection-minio-init-dev
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb myminio/defect-images --ignore-existing;
      mc policy set download myminio/defect-images;
      echo 'MinIO bucket initialized';
      exit 0;
      "
    networks:
      - defect-network

networks:
  defect-network:
    driver: bridge

volumes:
  minio_data: